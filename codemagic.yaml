# Codemagic configuration file
# Reference: https://docs.codemagic.io/yaml-schema/yaml-integration/

workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      groups:
        - apple_credentials # Codemagic'te tanımlayacağınız API anahtarları grubu (dağıtım için gerekir)
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Set up code signing
        # Eğer App Store Connect API anahtarınızı Codemagic'e bağladıysanız, 
        # aşağıdaki komutların başındaki '#' işaretlerini kaldırarak otomatik imzalamayı aktif edebilirsiniz.
        script: |
          # keychain initialize
          # app-store-connect fetch-signing-files "com.oudtuner.app.oudTuner" --project-type ios --create
          # keychain add-certificates
          echo "Code signing setup skipped. To build a signed app, configure your Apple API keys in Codemagic."
      - name: Get Flutter Packages
        script: |
          flutter packages pub get
      - name: Flutter build iOS App
        script: |
          # EĞER İMZALAMA AKTİF DEĞİLSE (Mevcut Durum): Test amaçlı sadece derleme başarısını görmek için bu komut çalışır:
          flutter build ios --release --no-codesign
          
          # EĞER İMZALAMA AKTİFSE (App Store Connect için): 
          # Üstteki komutun başına '#' koyun ve alttaki komutun başındaki '#' işaretini kaldırın:
          # flutter build ipa --release
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - canyilmazz1903@gmail.com
        notify:
          success: true
          failure: true

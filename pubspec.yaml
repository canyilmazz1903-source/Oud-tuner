name: oud_tuner
description: A high-precision Oud Tuner, Makam Encyclopedia, Usul Metronome and Drone Generator for Turkish Classical Music.
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  pitch_detector_dart: ^0.0.1
  flutter_audio_capture: ^1.1.12
  permission_handler: ^11.3.0
  google_fonts: ^6.2.0
  just_audio: ^0.9.39

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
